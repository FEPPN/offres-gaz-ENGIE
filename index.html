<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil Engie Gaz - Papernest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @font-face {
            font-family: 'Avenir';
            src: local('Avenir'), local('Avenir-Light');
        }
        #papernest-engie-tool {
            font-family: 'Avenir', system-ui, -apple-system, sans-serif;
            background-color: transparent;
            width: 100%;
            display: block;
        }
        #papernest-engie-tool .hide-element { 
            display: none !important; 
        }
        #papernest-engie-tool #dropdown-menu::-webkit-scrollbar {
            width: 6px;
        }
        #papernest-engie-tool #dropdown-menu::-webkit-scrollbar-thumb {
            background-color: #E7E5E4;
            border-radius: 10px;
        }
        #desc-container {
            transition: all 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-transparent">

<div id="papernest-engie-tool" class="text-[#1C1917] antialiased">
    <div class="flex flex-col items-center py-2 w-full">
        
        <!-- Conteneur Principal -->
        <div class="bg-white rounded-[24px] w-full border border-[#E7E5E4] shadow-sm overflow-hidden">
            
            <!-- Bandeau Supérieur avec Logo Engie -->
            <div class="bg-[#FAFAF9] px-6 md:px-10 py-4 border-b border-[#E7E5E4] flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="https://d11o8pt3cttu38.cloudfront.net/wp-content/uploads/sites/12/2026/03/engie.svg" alt="Logo Engie" class="h-7 w-auto">
                    <span class="h-4 w-px bg-[#D6D3D1]"></span>
                    <span class="text-[10px] font-bold text-[#79716B] uppercase tracking-widest">Fournisseur historique</span>
                </div>
            </div>

            <!-- Corps de l'Outil -->
            <div class="p-6 md:p-10">
                <h1 class="text-xl font-bold mb-4 tracking-tight text-[#1C1917]">Trouvez votre offre de gaz Engie</h1>
                <p class="text-[#57534D] text-sm md:text-base mb-8 text-left leading-relaxed">
                    Consultez les détails de chaque offre de gaz naturel proposée par Engie et trouvez celle qui correspond le mieux à vos besoins de chauffage, d'eau chaude ou de cuisson.
                </p>
                
                <!-- Menu Déroulant -->
                <div class="mb-8 relative" id="dropdown-container">
                    <label class="block text-sm font-bold mb-3 text-[#1C1917]">Quelle offre vous intéresse ?</label>
                    <div id="select-btn" class="w-full bg-[#F6F5FF] border border-[#CECCFF] hover:border-[#5A52FF] text-sm py-4 px-5 rounded-xl transition-all font-semibold cursor-pointer flex items-center justify-between">
                        <div class="flex items-center gap-3 truncate pr-4">
                            <span id="select-icon" class="text-[#5A52FF] flex-shrink-0 flex items-center justify-center w-4 h-4">
                                <i data-lucide="layout-list" class="w-4 h-4"></i>
                            </span>
                            <span id="select-text" class="text-[#5A52FF] truncate">Sélectionner une offre...</span>
                        </div>
                        <i data-lucide="chevron-down" id="select-chevron" class="w-4 h-4 text-[#5A52FF] transition-transform duration-200"></i>
                    </div>
                    
                    <div id="dropdown-menu" class="hide-element relative w-full mt-2 bg-white border border-[#E7E5E4] rounded-xl shadow-xl max-h-[350px] overflow-y-auto py-2 z-10"></div>
                </div>

                <!-- Zone de Description Dynamique -->
                <div id="desc-container" class="hide-element mb-8 p-6 rounded-2xl border opacity-0 transform translate-y-2">
                    <div class="flex items-start gap-4">
                        <span id="desc-icon-wrapper" class="flex-shrink-0 mt-0.5 w-5 h-5 flex items-center justify-center"></span>
                        <div class="w-full">
                            <h4 id="desc-title" class="font-bold text-[#1B194D] text-lg mb-3"></h4>
                            
                            <div class="flex items-start gap-3 p-3 bg-white rounded-xl shadow-sm border border-white/50 mb-4">
                                <div id="profil-icon-bg" class="flex-shrink-0 p-1.5 rounded-lg">
                                    <i data-lucide="user-check" class="w-4 h-4"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] font-bold text-[#A6A09B] uppercase tracking-wider mb-0.5">Profil idéal</p>
                                    <p id="desc-profil-text" class="text-sm font-medium text-[#1B194D]"></p>
                                </div>
                            </div>

                            <div id="desc-text" class="text-[#57534D] text-sm leading-relaxed"></div>
                        </div>
                    </div>
                </div>

                <!-- Bouton d'Appel à l'Action (CTA) -->
                <div class="flex justify-center mt-6">
                    <button id="cta-btn" class="w-full sm:w-auto min-w-[260px] bg-[#5A52FF] hover:bg-[#443EC1] text-white font-bold text-base py-4 px-8 rounded-xl transition-all duration-200 shadow-lg flex items-center justify-center gap-3 group opacity-40 pointer-events-none">
                        <span>Voir l'offre !</span>
                        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    if (typeof lucide !== 'undefined') { lucide.createIcons(); }

    // ==========================================
    // 1. FONCTION DE TRACKING GA4 (postMessage)
    // ==========================================
    function trackTool(actionName) {
        const nom_du_tool = "offres-gaz-ENGIE";
        window.parent.postMessage({
            'event': 'tool_interaction',
            'tool_name': nom_du_tool, 
            'tool_action': actionName
        }, '*');
        
        // Console.log utile pour tester en local avant la prod
        // console.log(`[Tracking] ${nom_du_tool} -> ${actionName}`);
    }

    // ==========================================
    // 2. INTERSECTION OBSERVER (Visibilité outil)
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
        const toolElement = document.getElementById('papernest-engie-tool');
        const visibilityObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    trackTool('tool_visible'); // Déclenche l'événement visible
                    visibilityObserver.disconnect(); // On se déconnecte pour ne pas spammer si le user scrolle de haut en bas
                }
            });
        }, { threshold: 0.35 }); // Se déclenche quand 35% de l'outil est visible à l'écran

        if (toolElement) visibilityObserver.observe(toolElement);
    });

    // ==========================================
    // DONNÉES ET LOGIQUE DE L'OUTIL
    // ==========================================
    const engieOffers = [
        { 
            id: 'gaz-adapt-1an', 
            name: "Gaz Adapt 1 an", 
            url: "https://www.papernest.com/demarches-energie/engie/offres/gaz-adapt-1-an/", 
            type: "gaz", 
            profil: "Foyers chauffés au gaz souhaitant une offre indexée sur le marché pour rester agiles.", 
            description: "<ul class='list-disc pl-5 space-y-1.5'><li>Prix du gaz naturel indexé sur les marchés de gros.</li><li>L'abonnement et le prix du kWh évoluent selon les variations mensuelles.</li><li>Contrat d'un an renouvelable, idéal pour suivre les tendances du marché.</li></ul>" 
        },
        { 
            id: 'gaz-reference', 
            name: "Gaz Référence", 
            url: "https://www.papernest.com/demarches-energie/engie/offres/gaz-reference/", 
            type: "gaz", 
            profil: "Utilisateurs de gaz privilégiant la stabilité avec un prix fixe sur la part fourniture.", 
            description: "<ul class='list-disc pl-5 space-y-1.5'><li>Prix du kWh HT de gaz fixe sur la part fourniture de votre contrat.</li><li>Une offre simplifiée pour une meilleure visibilité de votre budget énergie.</li><li>Suivi de consommation inclus pour optimiser vos dépenses.</li></ul>" 
        },
        { 
            id: 'gaz-reference-3ans', 
            name: "Gaz Référence 3 ans", 
            url: "https://www.papernest.com/demarches-energie/engie/offres/gaz-reference-3-ans/", 
            type: "gaz", 
            profil: "Grands consommateurs de gaz cherchant à sécuriser leur tarif sur une très longue durée.", 
            description: "<ul class='list-disc pl-5 space-y-1.5'><li>Protection de 3 ans contre la hausse éventuelle des prix du gaz naturel.</li><li>Sérénité budgétaire maximale pour les foyers chauffés exclusivement au gaz.</li><li>Liberté de résiliation totale à tout moment et sans frais.</li></ul>" 
        }
    ];

    const typeColors = {
        gaz: { text: '#E17100', bg: '#FFFBEB', border: '#FEE685', icon: 'flame' }
    };

    const selectBtn = document.getElementById('select-btn');
    const selectText = document.getElementById('select-text');
    const selectIcon = document.getElementById('select-icon');
    const selectChevron = document.getElementById('select-chevron');
    const dropdownMenu = document.getElementById('dropdown-menu');
    const descContainer = document.getElementById('desc-container');
    const descTitle = document.getElementById('desc-title');
    const descProfilText = document.getElementById('desc-profil-text');
    const profilIconBg = document.getElementById('profil-icon-bg');
    const descText = document.getElementById('desc-text');
    const descIconWrapper = document.getElementById('desc-icon-wrapper');
    const ctaBtn = document.getElementById('cta-btn');

    let isOpen = false;
    let selectedOffer = null;

    function sendResize() {
        requestAnimationFrame(() => {
            window.parent.postMessage({
                type: 'papernest-tool-resize',
                height: document.body.scrollHeight
            }, '*');
        });
    }

    const observer = new ResizeObserver(() => sendResize());
    observer.observe(document.body);

    function renderDropdown() {
        dropdownMenu.innerHTML = '';
        const header = document.createElement('div');
        header.className = 'px-4 py-2 text-[10px] font-bold text-[#A6A09B] uppercase tracking-wider bg-white sticky top-0 z-10';
        header.innerText = "Offres Gaz Engie";
        dropdownMenu.appendChild(header);

        engieOffers.forEach(offer => {
            const theme = typeColors.gaz;
            const item = document.createElement('div');
            item.className = 'flex items-center justify-between px-5 py-3 cursor-pointer hover:bg-[#FAFAF9] transition-colors';
            item.innerHTML = `
                <div class="flex items-center gap-3">
                    <i data-lucide="${theme.icon}" class="w-4 h-4 text-[#A6A09B]"></i>
                    <span class="text-sm font-medium text-[#57534D]">${offer.name}</span>
                </div>
                <i data-lucide="check" class="w-4 h-4 hide-element" style="color: ${theme.text}"></i>
            `;
            
            // FUSION ONCLICK : Tracking du choix de l'offre en premier
            item.onclick = (e) => { 
                trackTool('select_offer_' + offer.id); 
                e.stopPropagation(); 
                selectOffer(offer, item); 
                closeDropdown(); 
            };
            
            dropdownMenu.appendChild(item);
        });
        lucide.createIcons();
    }

    function toggleDropdown() {
        isOpen = !isOpen;
        if (isOpen) {
            dropdownMenu.classList.remove('hide-element');
            selectChevron.classList.add('rotate-180');
        } else {
            closeDropdown();
        }
    }

    function closeDropdown() {
        isOpen = false;
        dropdownMenu.classList.add('hide-element');
        selectChevron.classList.remove('rotate-180');
    }

    function selectOffer(offer, itemElement) {
        selectedOffer = offer;
        const theme = typeColors.gaz;
        
        selectText.innerText = offer.name;
        selectText.className = 'truncate text-[#1C1917] font-bold';
        selectIcon.innerHTML = `<i data-lucide="${theme.icon}" class="w-4 h-4" style="color: ${theme.text}"></i>`;
        selectBtn.classList.remove('bg-[#F6F5FF]');
        selectBtn.classList.add('bg-white', 'border-[#5A52FF]', 'ring-2', 'ring-indigo-50');

        descContainer.style.backgroundColor = theme.bg;
        descContainer.style.borderColor = theme.border;
        descTitle.innerText = offer.name;
        descProfilText.innerText = offer.profil;
        profilIconBg.style.backgroundColor = theme.bg;
        profilIconBg.style.color = theme.text;
        descText.innerHTML = offer.description;
        descIconWrapper.innerHTML = `<i data-lucide="${theme.icon}" class="w-5 h-5" style="color: ${theme.text}"></i>`;
        
        descContainer.classList.remove('hide-element');
        setTimeout(() => {
            descContainer.classList.replace('opacity-0', 'opacity-100');
            descContainer.classList.remove('translate-y-2');
        }, 10);
        
        ctaBtn.classList.remove('opacity-40', 'pointer-events-none');
        lucide.createIcons();
    }

    // FUSION ONCLICK : Tracking de l'ouverture/fermeture via le bouton select
    selectBtn.onclick = (e) => { 
        trackTool(isOpen ? 'dropdown_close' : 'dropdown_open');
        e.stopPropagation(); 
        toggleDropdown(); 
    };
    
    // FUSION ONCLICK : Tracking si l'utilisateur clique en dehors pour fermer (abandon du choix)
    document.onclick = () => {
        if(isOpen) {
            trackTool('dropdown_close_outside');
            closeDropdown();
        }
    };
    
    // FUSION ONCLICK : Tracking du clic sortant (CTA) positionné AVANT la redirection
    ctaBtn.onclick = () => { 
        if (selectedOffer) {
            trackTool('click_cta_' + selectedOffer.id);
            
            // On ajoute un petit délai (200ms) pour laisser le temps au postMessage de partir vers le parent GA4
            setTimeout(() => {
                // Redirection sur la même page (window.top permet de rediriger la page hôte si l'outil est dans une iframe)
                window.top.location.href = selectedOffer.url;
            }, 200);
        }
    };

    window.onload = () => { renderDropdown(); sendResize(); };
</script>
</body>
</html>
